{% extends 'base.html' %}
{% load static %}

{% block title %}Check - Sajhya Healthcare{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h3>Welcome</h3>
                <h5> {{clinic.clinic_name}}</h5>
                <h5>{{clinic.clinic_code}}</h5>
            </div>
            <div class="auth-body">
                <div class="form-group">
                    <label for="clinic_search" class="form-label">Search Physios</label>
                    <input type="text" 
                           id="physio_search" 
                           class="form-control" 
                           placeholder="Type physio name..."
                           autocomplete="off"
                           autofocus>
                </div>

                <!-- Search Results Container -->
                <div id="search_results" style="display: none;">
                    <div class="search-results mt-3">
                        <h6>Matching Physios:</h6>
                        <div id="results_list" class="list-group"></div>
                    </div>
                </div>

                <!-- Loading Indicator -->
                <div id="loading" style="display: none;" class="text-center mt-3">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>

                <hr class="my-4">

                <!-- Create New Clinic Button -->
                <div class="d-grid gap-2">
                    <button onclick="location.href='{% url 'signup-personal'%}' "class="btn-gradient-a">
                        Register New Account
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Debounce function to prevent too many API calls
    function debounce(func, delay) {
        let timeout;
        return function() {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, arguments), delay);
        };
    }

    // Debounce function (keep as is)

    async function searchPhysios() {
        const searchTerm = document.getElementById('physio_search').value.trim();
        const resultsDiv = document.getElementById('search_results');
        const loadingDiv = document.getElementById('loading');
        const resultsList = document.getElementById('results_list');
        
        if (searchTerm.length < 2) {
            resultsDiv.style.display = 'none';
            return;
        }
        
        loadingDiv.style.display = 'block';
        resultsDiv.style.display = 'none';
        
        try {
            // ✅ Use the correct URL
            const url = `/clinic-acc/search-physio-list/?q=${encodeURIComponent(searchTerm)}`;
            const response = await fetch(url);
            const physios = await response.json();
            
            loadingDiv.style.display = 'none';
            
            if (physios.length > 0) {
                resultsList.innerHTML = physios.map(physio => `
                    <div class="list-group-item list-group-item-action">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <strong>${escapeHtml(physio.name)}</strong><br>
                                <small class="text-muted">User Name: ${escapeHtml(physio.user_name)}</small><br>
                                <small class="text-muted">Reg: ${escapeHtml(physio.registration_number)}</small>
                            </div>
                            <button class="btn btn-sm btn-primary" onclick="claimPhysio(${physio.id})">
                                Claim
                            </button>
                        </div>
                    </div>
                `).join('');
                resultsDiv.style.display = 'block';
            } else {
                resultsList.innerHTML = `<div class="alert alert-info">No physios found. <a href="{% url 'signup-personal' %}">Create one?</a></div>`;
                resultsDiv.style.display = 'block';
            }
        } catch (error) {
            console.error('Error:', error);
            loadingDiv.style.display = 'none';
            resultsList.innerHTML = `<div class="alert alert-danger">Error searching. Please try again.</div>`;
            resultsDiv.style.display = 'block';
        }
    }

    // Helper to prevent XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // Attach event listener to the correct input
    const searchInput = document.getElementById('physio_search');
    searchInput.addEventListener('input', debounce(searchPhysios, 500));

    function claimPhysio(physioId) {
        const clinicId = "{{ clinic.id|escapejs }}";

        console.log(`Claim: physio ID=${physioId}, clinic ID=${clinicId}`);

        fetch('/clinic-acc/claim-physio/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: `physio_id=${physioId}&clinic_id=${clinicId}`,
            credentials: 'same-origin'
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('Claimed!');
                window.history.go(-1);   // go back only on success
            } else {
                alert(data.error);       // show error, stay on page
            }
        })
        .catch(err => {
            console.error('Fetch error:', err);
            alert('Network error occurred');
        });
    }

    
</script>

<style>
    .search-results {
        max-height: 300px;
        overflow-y: auto;
    }
    .list-group-item {
        margin-bottom: 5px;
        border-radius: 5px;
    }
    .btn-gradient-a {
        width: 100%;
    }
</style>

{% endblock %}
